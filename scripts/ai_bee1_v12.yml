Ex5_7:
  type: message
  text: |    
    Только, пожалуйста, не относись к такой структуре и к такому формату как к единственно правильным. "Единственно правильных" не существует: ИИ понимает разные структуры и разные форматы указания этой структуры в тексте (например, <теги> вместо заголовков). 
    
    *Так зачем же их использовать?*
    
    🦾 Структура и обозначения для заголовков нужны, чтобы *не запутать ИИ* (люди ведь тоже лучше понимают заголовки и пункты, чем длинные неформатированные тексты).
    
    💪 Но главное — это нужно для тебя: когда человек структурирует, он часто *лучше понимает задачу*, которую хочет решить! 
    
    Ведь человек — как бы руководитель для ИИ; а если руководитель плохо понимает суть задачи, то вряд ли она будет решена хорошо, каким бы умным ни был исполнитель.
