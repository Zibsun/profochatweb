    *Выбранная идея картинки:*
    ```
    <здесь напиши выбранную идею с учетом ответа пользователя>
    ```
    {STOP}
    """
Ex6_11:
  type: message
  text: |
    *Шаг* 2️⃣ — попроси ИИ написать *промпт* для картинки.
    
    Можно было бы запросить это у ИИ очень просто: `Напиши промпт для такой картинки`.
    
    Но я поделюсь с тобой *секретным ингредиентом* такого запроса. Благодаря ему ты сможешь получать именно ту картинку, которая нужна, — иногда даже с первого раза.
  button: Давай свой секрет!

Ex6_13:
  type: message
  text: |
    *Указывай стиль картинки* — не надейся на то, что ИИ угадает твои желания в смысле стиля!
   
Ex6_14:
  type: message
  text: |
    *Из каких стилей можно выбрать?* Вот лишь некоторые:
    
    Фотореализм
