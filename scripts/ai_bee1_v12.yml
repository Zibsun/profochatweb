Ex6_15:
  type: message
  parse_mode: HTML
  text: |
    Эти 4 картинки сделал один и тот же генератор (Flux 1.1 Pro) по одному и тому же промпту, но только в конце промпта было указано 4 разных стиля: векторная иллюстрация, фотореализм и т.д.
    
    Как видишь, <b>из-за разного стиля</b> эти 4 картинки сильно отличаются, хотя в них идея абсолютно одна и та же.
    
    Вот промпт, который сделал эти картинки:
    <blockquote expandable>
    Большой белый экран телевизора, на котором изображена сцена разговора между женщиной и улыбающимся гуманоидным роботом; рядом с роботом и женщиной — два облака речи; экран белый, фон чёрный; фотореализм.
    </blockquote>
    В конце промпта здесь указан не только стиль, но и <b>цвета</b> — и я очень рекомендую тебе их указывать.
    
    Также бывает полезно указать ракурс («вид сверху», «крупный план», ...) и освещение («солнечный день», «неон», ...). Впрочем, это уже не для новичков.
  media:
    - https://drive.google.com/file/d/1xzU4eIYj3tn0sLJp4hwqXjCgTwl7aHuY/view
  button: Как мне такое делать?

Ex6_chat2:
  type: dialog
  model: gpt-4.1
  temperature: 0.4
  text: |
    Теперь просто сделай запрос к ИИ — чтобы он написал промпт для генерации картинки.
    
    Можешь просто написать так: `Создай промпт на основе этой идеи в стиле ...`. Можешь также добавить допустимые цвета или, например, ракурс.
    
    Если же хочешь внести изменения в ту идею, можешь отмотать наш чат немного вверх, скопировать идею картинки оттуда в текст твоего запроса и исправить. 
    #диалог
  prompt: |
    # Твоя роль
    Ты — креативный промпт-инженер. 
    Твоя цель — написать промпт для генерации картинки на основе запроса пользователя и %Контекста%.
    
    # Контекст
    Выбери пункт А или Б:
    А. Если пользователь НЕ указал идею картинки, то возьми ее в этом чате:
    ```
    {{Ex6_chat1[4}}
    ```
    
    Б. Иначе — если идею картинки указал пользователь — руководствуйся только запросом пользователя, а не чатом.

    # Шаблон ответа
    Ответь на запрос пользователя так:
    """
    *Промпт:*
    ```
    <Здесь сгенерируй промпт на основе идеи картинки с учетом %Контекста%. Промпт должен содержать конкретные детали про указанные в идее объекты, но БЕЗ добавления новых объектов. Промпт НЕ должен содержать профессионального жаргона дизайнеров. Предполагается выполнять промпт в Ideogram или FLUX>
    ```
    В генератор картинок лучше вставлять этот промпт на английском.

    *Перевод на русский:*
    
    <Здесь напиши точный перевод сгенерированного тобой промпта>

    *Соответствует ли этот промпт твоим ожиданиям от картинки?*
    
    👉 Если ответишь *«да»* — мы пойдем генерировать картинку.

    👉 Если в целом норм, но есть замечания, тогда скажи, *что именно поменять* — и я внесу эти изменения в этот промпт.

    👉 Если тебе не нравится, скажи *«перепиши»* — и я постараюсь сгенерировать другой промпт.
    """

    # Завершение диалога
    А. Если после этого пользователь ответит "да" или иначе выразит согласие двигаться дальше, напиши "{STOP}"
    Б. Если пользователь ответит что-то иное:
      — Если ты уже 3 промпта сгенерировал ранее, скажи "Сорри, но давай все-таки двигаться дальше! {STOP}"
      — Иначе напиши промпт с учетом слов пользователя на основе %Шаблоном ответа%. Если пользователь попросил "перепиши", меняй промпт максимально.

Ex6_21:
  type: message
  text: |
    Прежде чем ты сгенерируешь картинку, я хотел бы резюмировать последовательность действий:
    
    1️⃣ Сначала ты пишешь свой контекст: *для чего* тебе нужна картинка. И просишь от ИИ *несколько идей*: что именно можно изобразить на картинке. 
    
    ИИ на этом шаге выступает как креативщик, и он в этом деле хорош.

    2️⃣ Затем ты просишь у ИИ *промпт* на основе выбранной идеи картинки. Не забудь указать *стиль* (можешь также указать цвета, освещение, ...). 
    
    ИИ тут очень полезен, так как промпты для картинок сложные; учиться их писать долго, если ты не дизайнер.
  button: Дальше
    
Ex6_23:
  type: message
  text: |
    *Шаг* 3️⃣ — генерируешь картинку по промпту.
    
    Выше я сразу перевел англоязычный промпт от ИИ на русский язык, но есть нюанс.
    
    ☝️ Многим генераторам картинок важно, чтобы промпт был *на английском языке*. 

    Можно вставлять в них промпты и на русском, но если картинка получилась неправильная — вставляй на английском.
  button: А где взять генератор?
    
Ex6_25:
  type: message
  text: |
    *Какой генератор картинок лучше использовать?*
    
    Вот две модели-генератора изображений, которые доступны в России:
    
    Их много, но самые "понятливые" — Gemini (Nano Banana) и ChatGPT — недоступны из России. Вот те, которые доступны и имеют бесплатные лимиты:
    
    💪 [Ideogram](https://ideogram.ai/) — хорош для фотокачества и отлично понимает промпты, к тому же умеет автоматически их улучшать. Но весьма жесткие лимиты на число генераций.
    
    👌 Qwen Image — неплохое качество для всех стилей, работает в [чат-боте Qwen](https://chat.qwen.ai/), нужно там внизу нажать кнопку Image Generation
    
    👌 Flux — это семейство моделей с разным качеством и понятливостью, ее можно встретить в разных генераторах. Бесплатно доступна обычно только самая простая модель Flux 1 — например, в [Krea](https://www.krea.ai/image).
    
    👌 Кандинский — российская модель, она есть в [Telegram-боте GigaChat](https://t.me/gigachat_bot) (версия 3.1) и [на сайте](https://fusionbrain.ai/editor/) (3.0). С версии 3.1 Кандинский стал понимать промпты почти на уровне Flux 1, а фото-качество приблизилось к Ideogram 3.
    
    Во всех этих вариантах можно выбрать соотношение сторон картинки (например 16:9)
  button: А в чем разница?

Ex6_27:
  type: message
  text: |
