Ex4_7:
  type: message
  text: |
    Итак, во-первых, есть особые виды контекста, которые обычно легко задать в промпте: 
    
    1️⃣ *Роль для ИИ*: например, эксперт в такой-то области или преподаватель экстра-класса.
    
    2️⃣ *Общая цель*, в рамках которой ты хочешь решить данную задачу. Может включать твою ситуацию, для кого нужен результат и т.п.
    
    Например, если просто поставить задачу «Проанализируй качество этой рассылки» - тогда ИИ, скорее всего, просто похвалит: не будет серьезной критики.
    
    Но если перед задачей написать *цель* «Я хочу улучшить свои навыки написания рассылок, предназначенных для клиентов Телеком-оператора» — тогда ИИ даст больше полезных и конкретных критических замечаний.
  button: С этим понятно

Ex4_8:
  type: message
  text: |
    Во-вторых, в zero-shot промпте очень полезно задавать сразу требования к ответу ИИ, например:
    
    3️⃣ *Длина ответа*: примерное число слов, предложений или абзацев.
    
    4️⃣ *Формат ответа*: "в виде нумерованного списка", "пиши заголовок для каждой части" и т.п.
       
    5️⃣ *Стиль ответа*: "пиши простым языком", "подробно объясняй все термины", "используй 1 эмодзи на каждый пункт" и т.п.
  button: ОК, верю

Ex4_9:
  type: message
  parse_mode: HTML
  text: |
    Если пользоваться несколькими советами в одном промпте, он станет весьма длинным и сложным. 
    И в этом может быть проблема: <b>сложным промптом легко запутать ИИ!</b> Да и человек в таком тексте тоже легко запутается.
    
    Поэтому есть еще два совета 😇
    
    6️⃣ <b>Структура промпта</b>: разделяй промпт на именованные структурные элементы, например: Твоя роль, Задача, Требования, Формат ответа

    7️⃣ <b>Разметка промпта</b>: используй заголовки и списки для структуры; а также разделители (например, """) для отделения длинных текстов от самого промпта.
    
    Пример заголовков и списков:
    <blockquote expandable>
    ## Твоя роль
    Ты — эксперт по email-маркетингу, опытный цифровой маркетолог, который помогает сотруднику Телеком-оператора создавать привлекательный и познавательный контент для клиентов.
    
    ## Задача
    1. Проанализируй качество этой рассылки по критериям:
    - Живой, естественный язык, без канцелярита.
    - Минимум громоздких оборотов.
    - В начале есть интригующий заголовок, факт или вопрос, который заставит читателей прочитать письмо полностью.  
    - Нет банальных риторических вопросов, кликбейта и штампов.
    - Есть эмодзи: 1-2 на каждый раздел письма.
    - В конце каждого раздела есть призыв к действию
    
    2. Перепиши рассылку с учетом этих критериев.
    </blockquote>
    
  button: Вернемся к задаче
    
Ex4_chat2:
