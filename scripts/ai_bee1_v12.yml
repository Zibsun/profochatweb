    Если результат *не* нравится, лучше всего заново пройти 3 шага «идея -> промпт -> картинка». *Можно все это сделать прямо в Qwen или GigaChat.*
    
    Ну, а если тебе пока эти шаги сложно повторить без меня – можешь здесь вернуться в [начало этого упражнения](https://t.me/hgxmsbaibot?start=qhatp7).
    
    Если же результат тебе нравится, нам точно пора заканчивать — я больше не смогу тебя ничему научить 😉
  button: Закончить упражнение

Ex6_29:
  type: message
  text: |
    Напоследок я дам один важный совет:
    
    ☝️ Чтобы получать нужный результат от ИИ в *сложных* задачах, зачастую нужно немало *экспериментировать*. Например:
    1. Выполнять один и тот же промпт в разных инструментах / с разными моделями.
    2. Выполнять чуть разные промпты в одном инструменте.
    3. Можно просто несколько раз выполнить тот же промпт — результаты будут отличаться!
    
    В общем, работай почаще в паре с ИИ, критикуй его результаты, не бойся экспериментировать — и тогда тебя ждет успех 🚀
  button: Завершить курс
 
Ex6_end:
