Ex5_1:
  type: message
  text: |
    Какие-то слишком уж длинные промпты у нас получаются, тебе не кажется? 
    
    💡 *А что если промпты тоже генерировать с помощью ИИ, чтобы сэкономить усилия?* 
    Эту идею можно применять в разных ситуациях, например: 
    
    — Дальше мы будем генерировать *промпты для картинок*, так как они сложнее промптов для текста.
    
    — Эта идея также отлично работает для *one-shot* промптов, когда в качестве примера дается какой-то чужой промпт. Хороших промптов в Интернете много, только вот они редко подходят на 100%.

    А вот для обычных *zero-shot* промптов бездумная реализация этой идеи может привести к проблеме: легко получить от ИИ много слов, которые окажутся несоответствующими задаче.

Ex5_2:
  type: message
  text: |
